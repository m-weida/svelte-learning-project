name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    if: ${{ github.event_name == 'pull_request' || github.event.head_commit.committer.name != 'GitHub' || !contains(github.event.head_commit.message, ' (#') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Check
            command: pnpm check
            needs_cypress: false
          - name: Unit and component tests
            command: pnpm test
            needs_cypress: false
          - name: Cypress E2E tests
            command: pnpm test:e2e
            needs_cypress: true

    name: ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Cache Cypress binary
        if: ${{ matrix.needs_cypress }}
        uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: ${{ runner.os }}-cypress-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Cypress binary
        if: ${{ matrix.needs_cypress }}
        run: pnpm exec cypress verify || pnpm exec cypress install

      - name: ${{ matrix.name }}
        run: ${{ matrix.command }}
