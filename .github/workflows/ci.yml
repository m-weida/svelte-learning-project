name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    if: ${{ github.event_name == 'pull_request' || github.event.head_commit.committer.name != 'GitHub' || !contains(github.event.head_commit.message, ' (#') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Cache Cypress binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: ${{ runner.os }}-cypress-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Cypress binary
        run: pnpm exec cypress verify || pnpm exec cypress install

      - name: Check
        run: pnpm check

      - name: Unit and component tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Cypress E2E tests
        run: pnpm test:e2e
